<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Agent — Local Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #e5ddd5; height: 100vh; display: flex; flex-direction: column; }

        /* Doctor selection */
        #doctor-select { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        #doctor-select h1 { margin-bottom: 24px; color: #333; font-size: 22px; }
        .doctor-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; }
        .doctor-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px; cursor: pointer; transition: background 0.15s; }
        .doctor-card:hover { background: #dcf8c6; }
        .doctor-name { font-weight: 600; font-size: 16px; color: #111; }
        .doctor-specialty { font-size: 13px; color: #666; margin-top: 4px; }
        .loading { color: #888; font-size: 16px; }

        /* Chat */
        #chat-view { display: none; flex-direction: column; height: 100vh; }
        #chat-header { background: #075e54; color: #fff; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
        #chat-header .info { font-size: 16px; font-weight: 600; }
        #chat-header .info span { font-size: 12px; font-weight: 400; opacity: 0.8; }
        #back-btn { background: none; border: none; color: #fff; font-size: 14px; cursor: pointer; padding: 6px 12px; border-radius: 6px; }
        #back-btn:hover { background: rgba(255,255,255,0.15); }

        #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 8px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .msg.user { background: #dcf8c6; align-self: flex-end; border-bottom-left-radius: 2px; }
        .msg.agent { background: #fff; align-self: flex-start; border-bottom-right-radius: 2px; }
        .msg.typing { background: #fff; align-self: flex-start; color: #888; font-style: italic; }

        #input-area { display: flex; gap: 8px; padding: 10px 16px; background: #f0f0f0; }
        #msg-input { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 20px; font-size: 14px; outline: none; direction: rtl; }
        #msg-input:focus { border-color: #075e54; }
        #send-btn { background: #075e54; color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; }
        #send-btn:disabled { opacity: 0.5; cursor: default; }
    </style>
</head>
<body>
    <!-- Doctor Selection -->
    <div id="doctor-select">
        <h1>בחר רופא</h1>
        <div class="doctor-list" id="doctor-list">
            <div class="loading">טוען רשימת רופאים...</div>
        </div>
    </div>

    <!-- Chat View -->
    <div id="chat-view">
        <div id="chat-header">
            <button id="back-btn">חזרה</button>
            <div class="info">
                <div id="doctor-display"></div>
                <span id="specialty-display"></span>
            </div>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <button id="send-btn">&#9654;</button>
            <input type="text" id="msg-input" placeholder="הקלד הודעה..." autocomplete="off">
        </div>
    </div>

    <script>
        let selectedDoctorId = null;

        // Load doctors
        async function loadDoctors() {
            try {
                const resp = await fetch("/chat/doctors");
                const doctors = await resp.json();
                const list = document.getElementById("doctor-list");
                list.innerHTML = "";
                doctors.forEach(d => {
                    const card = document.createElement("div");
                    card.className = "doctor-card";
                    card.innerHTML = `<div class="doctor-name">${d.name}</div><div class="doctor-specialty">${d.specialty}</div>`;
                    card.onclick = () => selectDoctor(d);
                    list.appendChild(card);
                });
            } catch (e) {
                document.getElementById("doctor-list").innerHTML = '<div class="loading">שגיאה בטעינת רופאים</div>';
            }
        }

        function selectDoctor(doctor) {
            selectedDoctorId = doctor.id;
            document.getElementById("doctor-display").textContent = doctor.name;
            document.getElementById("specialty-display").textContent = doctor.specialty;
            document.getElementById("doctor-select").style.display = "none";
            document.getElementById("chat-view").style.display = "flex";
            document.getElementById("msg-input").focus();
        }

        document.getElementById("back-btn").onclick = () => {
            document.getElementById("chat-view").style.display = "none";
            document.getElementById("doctor-select").style.display = "flex";
            document.getElementById("messages").innerHTML = "";
            selectedDoctorId = null;
        };

        // Chat
        function addMessage(text, cls) {
            const div = document.createElement("div");
            div.className = "msg " + cls;
            div.textContent = text;
            document.getElementById("messages").appendChild(div);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text || !selectedDoctorId) return;

            input.value = "";
            addMessage(text, "user");

            const sendBtn = document.getElementById("send-btn");
            sendBtn.disabled = true;
            input.disabled = true;
            const typing = addMessage("...", "typing");

            try {
                const resp = await fetch("/chat/send", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ doctor_id: selectedDoctorId, message: text }),
                });
                const data = await resp.json();
                typing.remove();
                addMessage(data.reply, "agent");
            } catch (e) {
                typing.remove();
                addMessage("שגיאה בשליחת ההודעה", "agent");
            } finally {
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        document.getElementById("send-btn").onclick = sendMessage;
        document.getElementById("msg-input").onkeydown = (e) => {
            if (e.key === "Enter") sendMessage();
        };

        loadDoctors();
    </script>
</body>
</html>
